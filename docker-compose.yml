name: user-service-compose

networks: 
  user-service-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - user-service-net
    environment:
      POSTGRES_DB: userservice
      POSTGRES_USER: userservice
      POSTGRES_PASSWORD: userservice
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userservice -d userservice"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  user-service:
    image: user-service:latest
    networks:
      - user-service-net
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: